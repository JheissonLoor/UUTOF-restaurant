<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>UTTOF — Panel de Cocina (Básico)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#FAF6F0; --bg2:#F4ECE0; --surface:#FFFFFF;
  --ink:#1F1A14; --ink2:#3A322A; --ink3:#6B6056; --ink4:#9B9189;
  --border:rgba(31,26,20,0.08); --border2:rgba(31,26,20,0.15);
  --coral:#E94B33; --coral2:#C93820; --coral50:#FDE8E2; --coral100:#FACFC2;
  --mint:#5BB39A; --mint2:#3A8A72; --mint50:#DEF1EA;
  --sun:#E8B14A; --sun2:#B07E1E; --sun50:#FBEFD1;
  --sky:#6B8FA8; --sky2:#4A6F88; --sky50:#E8EFF5;
  --plum:#8C6BA1; --plum50:#EFE9F4;
  --shadow:0 1px 2px rgba(31,26,20,0.04), 0 10px 28px -12px rgba(31,26,20,0.12);
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:"Inter",-apple-system,"Segoe UI",sans-serif;
  background:var(--bg); color:var(--ink);
  -webkit-font-smoothing:antialiased; font-size:14px;
  min-height:100vh;
}
button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
.tnum { font-variant-numeric:tabular-nums; }

/* ===== Topbar ===== */
.top {
  height:64px; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:14px; padding:0 28px;
  position:sticky; top:0; z-index:20;
}
.brand { display:flex; align-items:center; gap:12px; }
.brand-mark {
  width:38px; height:38px; border-radius:12px; background:var(--coral);
  display:grid; place-items:center; color:#fff;
}
.brand-name { font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:20px; }
.top-pill {
  margin-left:18px; display:flex; align-items:center; gap:8px;
  background:var(--coral50); color:var(--coral2);
  padding:8px 16px; border-radius:999px; font-weight:600; font-size:13.5px;
}
.top-spacer { flex:1; }
.top-clock { font-family:"JetBrains Mono",monospace; font-size:13px; color:var(--ink3); }
.top-user { display:flex; align-items:center; gap:10px; font-weight:600; font-size:14px; }
.top-avatar {
  width:32px; height:32px; border-radius:50%; background:var(--sun50); color:var(--sun2);
  display:grid; place-items:center; font-size:13px; font-weight:700;
}

/* ===== Page head ===== */
.page { padding:28px 28px 40px; max-width:1720px; margin:0 auto; }
.page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:20px; }
.page-head h1 { font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:34px; margin:0; letter-spacing:-0.01em; }
.page-head .sub { color:var(--ink3); margin-top:6px; font-size:14px; }
.page-head .sub b { color:var(--coral2); }
.mesa-filter {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border2);
  padding:10px 18px; border-radius:12px; font-weight:600; font-size:13.5px; color:var(--ink2);
}

/* ===== Filter tabs ===== */
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
.tab {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  padding:10px 18px; border-radius:999px; font-weight:600; font-size:13.5px; color:var(--ink3);
  transition:all .15s;
}
.tab .n { color:var(--ink4); font-weight:500; }
.tab.active { background:var(--coral); border-color:var(--coral); color:#fff; box-shadow:0 8px 20px -8px rgba(233,75,51,0.5); }
.tab.active .n { color:rgba(255,255,255,0.75); }

/* ===== Board ===== */
.board { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; align-items:start; }
.col {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:18px; overflow:hidden; min-height:420px;
  display:flex; flex-direction:column;
}
.col-head {
  display:flex; align-items:center; gap:9px;
  padding:14px 16px; border-bottom:1px solid var(--border);
  background:var(--surface);
}
.col-head .dot { width:9px; height:9px; border-radius:50%; }
.col-head .t { font-weight:700; font-size:14.5px; flex:1; }
.col-head .count {
  min-width:26px; height:24px; padding:0 8px; border-radius:999px;
  background:var(--bg2); border:1px solid var(--border);
  display:grid; place-items:center; font-size:12px; font-weight:700; color:var(--ink3);
  font-family:"JetBrains Mono",monospace;
}
.col-body { padding:12px; display:flex; flex-direction:column; gap:12px; flex:1; }
.col-empty {
  flex:1; display:grid; place-items:center; color:var(--ink4); font-size:13px;
  padding:40px 0; text-align:center;
}
.col-empty .ico { opacity:0.5; margin-bottom:8px; }

/* Column accents */
.col[data-c="espera"]  .dot { background:var(--sun); }
.col[data-c="cocina"]  .dot { background:var(--coral); }
.col[data-c="listo"]   .dot { background:var(--mint); }
.col[data-c="entregado"] .dot { background:var(--sky); }
.col[data-c="pagado"]  .dot { background:var(--plum); }

/* ===== Card ===== */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:14px; box-shadow:var(--shadow);
}
.card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.card-num { font-family:"Fraunces",Georgia,serif; font-weight:700; font-size:19px; }
.card-badge {
  margin-left:auto; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px;
  letter-spacing:0.02em;
}
.b-espera   { background:var(--sun50); color:var(--sun2); }
.b-cocina   { background:var(--coral50); color:var(--coral2); }
.b-listo    { background:var(--mint50); color:var(--mint2); }
.b-entregado{ background:var(--sky50); color:var(--sky2); }
.b-pagado   { background:var(--plum50); color:var(--plum); }

.card-meta { display:flex; flex-direction:column; gap:6px; font-size:12.5px; color:var(--ink3); }
.card-meta .row { display:flex; align-items:center; gap:7px; }
.card-meta .row svg { flex:none; opacity:0.65; }
.card-meta b { color:var(--ink2); font-weight:600; }

.card-items { margin:10px 0; display:flex; flex-direction:column; gap:5px; }
.card-item { display:flex; align-items:baseline; gap:8px; font-size:12.5px; }
.card-item .q {
  font-family:"JetBrains Mono",monospace; font-size:10.5px; font-weight:600;
  background:var(--bg2); border:1px solid var(--border);
  padding:1px 6px; border-radius:5px; color:var(--ink3); flex:none;
}
.card-item .nm { color:var(--ink2); }
.card-item .nt { font-style:italic; color:var(--coral2); font-size:11.5px; }

.card-foot {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding-top:10px; border-top:1px dashed var(--border2);
}
.card-time { font-family:"JetBrains Mono",monospace; font-size:11.5px; color:var(--ink4); }
.card-time.hot { color:var(--coral2); font-weight:600; }
.card-total { font-family:"Fraunces",Georgia,serif; font-weight:700; font-size:16px; }

.card-cta {
  width:100%; margin-top:10px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  padding:10px; border-radius:10px; font-weight:600; font-size:13px;
  background:var(--coral50); color:var(--coral2);
  transition:all .15s;
}
.card-cta:hover { background:var(--coral100); }
.card-cta.mint { background:var(--mint50); color:var(--mint2); }
.card-cta.sky  { background:var(--sky50); color:var(--sky2); }

/* Toast */
.toast {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#FAF6F0; padding:12px 22px; border-radius:999px;
  font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:9px;
  box-shadow:0 16px 40px -12px rgba(31,26,20,0.5); z-index:50;
  animation:toastin .25s cubic-bezier(.18,.9,.32,1.1);
}
@keyframes toastin { from { transform:translate(-50%,16px); opacity:0; } to { transform:translate(-50%,0); opacity:1; } }

/* Version tag */
.ver-tag {
  font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--ink4);
  border:1px solid var(--border2); padding:4px 10px; border-radius:999px;
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const I = ({ children, size=14, sw=1.8 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);
const IcUser  = (p) => <I {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6"/></I>;
const IcTable = (p) => <I {...p}><path d="M3 10h18M5 10v10M19 10v10M7 10V6h10v4"/></I>;
const IcClock = (p) => <I {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></I>;
const IcMove  = (p) => <I {...p}><path d="M5 12h14M13 6l6 6-6 6"/></I>;
const IcCheck = (p) => <I {...p}><path d="m4 12 5 5L20 6"/></I>;
const IcChef  = (p) => <I {...p}><path d="M8 3a4 4 0 0 0-4 4c0 1.5.8 2.8 2 3.4V17h12v-6.6c1.2-.6 2-1.9 2-3.4a4 4 0 0 0-6.5-3.1A4 4 0 0 0 8 3z"/><path d="M6 21h12"/></I>;
const IcHash  = (p) => <I {...p}><path d="M9 3 7 21M17 3l-2 18M4 8h17M3 16h17"/></I>;
const IcEmpty = (p) => <I {...p} size={26}><circle cx="12" cy="12" r="9"/><path d="M8 14c1 1.2 2.4 2 4 2s3-.8 4-2"/><path d="M9 9.5h.01M15 9.5h.01"/></I>;

const COLS = [
  { id:"espera",    label:"En espera",      badge:"b-espera",    cta:"Empezar preparación", ctaClass:"",     next:"cocina" },
  { id:"cocina",    label:"En preparación", badge:"b-cocina",    cta:"Marcar terminado",    ctaClass:"mint", next:"listo" },
  { id:"listo",     label:"Terminado",      badge:"b-listo",     cta:"Entregar a mesa",     ctaClass:"sky",  next:"entregado" },
  { id:"entregado", label:"Por pagar",      badge:"b-entregado", cta:null,                  ctaClass:"",     next:null },
  { id:"pagado",    label:"Pagado",         badge:"b-pagado",    cta:null,                  ctaClass:"",     next:null },
];
const BADGE_LBL = { espera:"En espera", cocina:"Preparando", listo:"Listo", entregado:"Por pagar", pagado:"Pagado" };

const initOrders = () => [
  { id:7,  cliente:"Carlos López", mesa:5,  estado:"entregado", min:52,
    items:[ {q:2,n:"Ají de Gallina"}, {q:2,n:"Chicha Morada"}, {q:1,n:"Suspiro a la Limeña"} ], total:120 },
  { id:2,  cliente:"María García", mesa:2,  estado:"pagado", min:64,
    items:[ {q:2,n:"Papa a la Huancaína"}, {q:1,n:"Lomo Saltado"} ], total:78 },
  { id:9,  cliente:"Ana Reyes",    mesa:8,  estado:"espera", min:2,
    items:[ {q:1,n:"Ceviche Clásico", nt:"Sin ají"}, {q:2,n:"Pisco Sour"} ], total:83 },
  { id:10, cliente:"Jorge Quispe", mesa:3,  estado:"cocina", min:9,
    items:[ {q:2,n:"Arroz con Mariscos"}, {q:1,n:"Causa Limeña"}, {q:2,n:"Inca Kola"} ], total:136 },
  { id:11, cliente:"Lucía Torres", mesa:11, estado:"cocina", min:16,
    items:[ {q:1,n:"Pollo a la Brasa", nt:"Cliente alérgico — sin sal extra"}, {q:1,n:"Picarones"} ], total:50 },
  { id:12, cliente:"Diego Ramos",  mesa:6,  estado:"listo", min:14,
    items:[ {q:3,n:"Tiradito de Pescado"}, {q:1,n:"Maracuyá Sour"} ], total:122 },
];

const Card = ({ o, onAdvance }) => {
  const col = COLS.find(c => c.id === o.estado);
  return (
    <div className="card">
      <div className="card-top">
        <span className="card-num">#{o.id}</span>
        <span className={`card-badge ${col.badge}`}>{BADGE_LBL[o.estado]}</span>
      </div>
      <div className="card-meta">
        <div className="row"><IcUser/> <b>{o.cliente}</b></div>
        <div className="row"><IcTable/> Mesa {o.mesa}</div>
      </div>
      <div className="card-items">
        {o.items.map((it,i)=>(
          <div key={i} className="card-item">
            <span className="q">{it.q}×</span>
            <span className="nm">{it.n}</span>
            {it.nt && <span className="nt">⚠ {it.nt}</span>}
          </div>
        ))}
      </div>
      <div className="card-foot">
        <span className={`card-time tnum ${o.min > 20 && o.estado !== "pagado" && o.estado !== "entregado" ? "hot" : ""}`}>
          <IcClock size={11}/> hace {o.min} min
        </span>
        <span className="card-total">S/ {o.total}</span>
      </div>
      {col.cta && (
        <button className={`card-cta ${col.ctaClass}`} onClick={() => onAdvance(o.id, col.next, col.cta)}>
          <IcMove size={14}/> {col.cta}
        </button>
      )}
    </div>
  );
};

const App = () => {
  const [orders, setOrders] = useState(initOrders);
  const [filter, setFilter] = useState("todos");
  const [toast, setToast] = useState(null);
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  const counts = useMemo(() => {
    const c = { todos: orders.length };
    COLS.forEach(col => { c[col.id] = orders.filter(o => o.estado === col.id).length; });
    return c;
  }, [orders]);

  const activos = orders.filter(o => o.estado === "espera" || o.estado === "cocina").length;

  const onAdvance = (id, next, lbl) => {
    setOrders(os => os.map(o => o.id === id ? { ...o, estado: next } : o));
    const o = orders.find(o => o.id === id);
    setToast(`Pedido #${id} → ${BADGE_LBL[next]}`);
    setTimeout(() => setToast(null), 2200);
  };

  const visibleCols = filter === "todos" ? COLS : COLS.filter(c => c.id === filter);

  return (
    <>
      <header className="top">
        <div className="brand">
          <div className="brand-mark">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round">
              <path d="M7 3v7c0 1.1.9 2 2 2s2-.9 2-2V3M9 3v18M16 3c-1.5 1.5-2 4-2 6 0 1.7 1 3 2 3v9M16 3v9"/>
            </svg>
          </div>
          <span className="brand-name">UTTOF</span>
        </div>
        <div className="top-pill"><IcChef size={15}/> Panel de Cocina</div>
        <span className="ver-tag">Versión básica</span>
        <div className="top-spacer"></div>
        <span className="top-clock tnum">{now.toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"})} · Lima</span>
        <div className="top-user">
          <div className="top-avatar">M</div> Chef Mario
        </div>
      </header>

      <main className="page" data-screen-label="Cocina Basico">
        <div className="page-head">
          <div>
            <h1>Panel de Cocina</h1>
            <div className="sub"><b>{activos}</b> pedido{activos !== 1 ? "s" : ""} activo{activos !== 1 ? "s" : ""} en cocina · {counts.listo} listo{counts.listo !== 1 ? "s" : ""} para servir</div>
          </div>
          <button className="mesa-filter"><IcHash size={14}/> Todas las mesas</button>
        </div>

        <div className="tabs">
          <button className={`tab ${filter === "todos" ? "active" : ""}`} onClick={()=>setFilter("todos")}>
            Todos <span className="n">({counts.todos})</span>
          </button>
          {COLS.map(c => (
            <button key={c.id} className={`tab ${filter === c.id ? "active" : ""}`} onClick={()=>setFilter(c.id)}>
              {c.label} <span className="n">({counts[c.id]})</span>
            </button>
          ))}
        </div>

        <div className="board" style={filter !== "todos" ? {gridTemplateColumns:"minmax(300px, 420px)"} : null}>
          {visibleCols.map(col => {
            const list = orders.filter(o => o.estado === col.id);
            return (
              <section key={col.id} className="col" data-c={col.id}>
                <div className="col-head">
                  <span className="dot"></span>
                  <span className="t">{col.label}</span>
                  <span className="count tnum">{list.length}</span>
                </div>
                <div className="col-body">
                  {list.length === 0
                    ? <div className="col-empty"><div><div className="ico"><IcEmpty/></div>Sin pedidos</div></div>
                    : list.map(o => <Card key={o.id} o={o} onAdvance={onAdvance}/>)
                  }
                </div>
              </section>
            );
          })}
        </div>
      </main>

      {toast && <div className="toast"><IcCheck size={15} sw={2.4}/> {toast}</div>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
